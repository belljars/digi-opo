<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>digi-opo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>digi-opo</h1>
          <p>Paikallinen tutkintopankki (TypeScript + pywebview).</p>
        </div>
        <div class="badge">MVP</div>
      </header>

      <section class="workspace">
        <aside class="panel panel-list">
          <div id="count" class="count"></div>
          <ul id="tutkinto-list" class="list"></ul>
        </aside>

        <section class="panel panel-detail">
          <div id="detail" class="detail"></div>
        </section>
      </section>
    </main>

    <!-- Build TypeScript first so dist/ui/main.js exists, then copy to src/ui/main.js -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
