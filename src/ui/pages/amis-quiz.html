<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vertaa tutkintonimikkeitä pareittain ja rakenna itsellesi kiinnostavuusjärjestys."
    />
    <title>digi-opo - Amis-korttivertailu</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-page="amis-quiz" data-subtitle="Amis-korttivertailu">
    <a class="skip-link" href="#main-content">Siirry sisältöön</a>
    <main class="app" id="main-content">
      <div id="app-header"></div>

      <section class="panel panel-quiz">
        <header class="quiz-header">
          <div>
            <h2>Amis-korttivertailu</h2>
            <p class="quiz-lead">Rakennetaan koko suosikkijärjestys yksi vertailu kerrallaan.</p>
          </div>
          <button id="quiz-restart" type="button">Aloita alusta</button>
        </header>
        <section class="quiz-overview" aria-label="Kyselyn tila">
          <div class="quiz-meta">
            <span id="quiz-count"></span>
            <span id="quiz-stage"></span>
          </div>
          <p id="quiz-help" class="quiz-help">Valitse kiinnostavampi vaihtoehto. Nuolinäppäimet toimivat myös.</p>
          <p id="quiz-feedback" class="saved-feedback" aria-live="polite"></p>
        </section>
        <section class="quiz-play" aria-label="Vertailu">
          <div class="quiz-play-header">
            <h3 id="quiz-prompt">Kumpi kiinnostaa enemmän?</h3>
            <p class="quiz-shortcuts">Vasen/oikea nuoli toimii valintana.</p>
          </div>
          <div id="quiz-cards" class="quiz-cards">
            <div id="quiz-vasen" class="quiz-card-slot"></div>
            <div id="quiz-oikea" class="quiz-card-slot"></div>
          </div>
        </section>
        <section id="quiz-valmis" class="quiz-results" hidden>
          <h3>Valmis</h3>
          <div id="quiz-summary" class="quiz-summary"></div>
          <section class="quiz-ranking" aria-labelledby="quiz-top3-title">
            <h4 id="quiz-top3-title">Kolme kärjessä</h4>
            <div id="quiz-top3"></div>
          </section>
          <details class="quiz-ranking">
            <summary>Näytä koko järjestys</summary>
            <ol id="quiz-ranking-list" class="quiz-ranking-list"></ol>
          </details>
        </section>
      </section>

      <footer id="app-footer" class="site-footer"></footer>
    </main>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/amis-quiz.js"></script>
  </body>
</html>
