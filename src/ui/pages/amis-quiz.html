<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>digi-opo - amis korttivertailu</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-page="amis-quiz" data-subtitle="Amis-korttivertailu">
    <main class="app">
      <div id="app-header"></div>

      <section class="panel panel-quiz">
        <header class="quiz-header">
          <h2>Amis-korttivertailu</h2>
          <div class="quiz-meta">
            <span id="quiz-count"></span>
            <button id="quiz-ohita" type="button">Vaihda pari</button>
          </div>
        </header>
        <p id="quiz-feedback" class="saved-feedback" aria-live="polite"></p>
        <div id="quiz-cards" class="quiz-cards">
          <div id="quiz-vasen" class="quiz-card" role="button" tabindex="0"></div>
          <div id="quiz-oikea" class="quiz-card" role="button" tabindex="0"></div>
        </div>
        <section id="quiz-valmis" class="quiz-results" hidden>
          <h3>Valmis</h3>
          <div id="quiz-top3" class="quiz-ranking"></div>
          <details class="quiz-ranking">
            <summary>Nayta kaikki tutkintonimikkeet</summary>
            <ol id="quiz-ranking-list" class="quiz-ranking-list"></ol>
          </details>
        </section>
      </section>

      <footer id="app-footer" class="site-footer"></footer>
    </main>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/amis-quiz.js"></script>
  </body>
</html>
