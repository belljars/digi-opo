<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>digi-opo - opintopolku</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-page="quiz" data-subtitle="Opintopolku-kysely">
    <main class="app">
      <div id="app-header"></div>

      <section class="panel panel-quiz">
        <header class="quiz-header">
          <div>
            <h2>Opintopolku-kysely</h2>
            <p class="quiz-lead">Vastaukset tallentuvat myos kesken kaiken, joten voit jatkaa myohemmin.</p>
          </div>
          <button id="quiz-restart" type="button">Aloita alusta</button>
        </header>

        <section class="quiz-overview" aria-label="Quiz tila">
          <div class="quiz-meta">
            <span id="quiz-progress"></span>
            <span id="quiz-status"></span>
          </div>
          <p id="quiz-feedback" class="saved-feedback" aria-live="polite"></p>
        </section>

        <div class="quiz-body">
          <div id="quiz-loading" class="quiz-loading">Ladataan...</div>

          <form id="quiz-form" class="quiz-form" hidden>
            <h3 id="quiz-question"></h3>
            <div id="quiz-options" class="quiz-options"></div>
            <div class="quiz-actions">
              <button id="quiz-next" type="button" disabled>Seuraava</button>
            </div>
          </form>

          <section id="quiz-results" class="quiz-results" hidden>
            <h3>Sinulle sopivin vaihtoehto</h3>
            <div id="quiz-top" class="quiz-result-card"></div>
            <h4>Myös tämä voi sopia</h4>
            <div id="quiz-runner-up" class="quiz-result-card secondary"></div>
          </section>
        </div>
      </section>

      <footer id="app-footer" class="site-footer"></footer>
    </main>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/quiz.js"></script>
  </body>
</html>
