<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>digi-opo - Digitaalinen tutkintopankki</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-page="tekoaly-chat" data-subtitle="Tekoäly-chat opiskelijoille ja tuleville">
    <main class="app">
      <div id="app-header"></div>

      <div id="main-content">
        <h1 id="app-title">digi-opo</h1>
        <div id= "chat-main">
          <div id="sivu"></div>
          <div id="chat-container">
            <div id="chat-messages"></div>
            <form id="chat-form">
              <input type="text" id="chat-input" placeholder="Kirjoita viestisi..." autocomplete="off" />
              <button type="submit">Lähetä</button>
            </form>
          </div>
        </div>
      </div>

      <footer id="app-footer" class="site-footer"></footer>
    </main>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/ai-chat.js"></script> <!-- Tekoäly-chatin JavaScript-tiedosto: ei vielä olemassa -->
  </body>
</html>
