<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>digi-opo</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body data-page="index" data-subtitle="Amis tutkintopankki">
    <main class="app">
      <div id="app-header"></div>

      <section class="workspace">
        <aside class="panel panel-list">
          <div class="pankki-filters">
            <div class="search">
              <label for="tutkinto-search">Haku</label>
              <input
                id="tutkinto-search"
                type="search"
                placeholder="Hae tutkinnon nimellä tai nimikkeellä"
                autocomplete="off"
              />
            </div>
            <div class="search">
              <label for="tutkinto-filter">Tutkinto</label>
              <select id="tutkinto-filter">
                <option value="">Kaikki tutkinnot</option>
              </select>
            </div>
            <label class="filter-toggle" for="saved-only-filter">
              <input id="saved-only-filter" type="checkbox" />
              <span>Vain tallennetut tutkintonimikkeet</span>
            </label>
          </div>
          <div id="count" class="count"></div>
          <ul id="tutkinto-list" class="list"></ul>
        </aside>

        <section class="panel panel-detail">
          <div id="detail-feedback" class="saved-feedback" aria-live="polite"></div>
          <div id="detail" class="detail"></div>
        </section>
      </section>

      <footer id="app-footer" class="site-footer"></footer>
    </main>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/pankki.js"></script>
  </body>
</html>
